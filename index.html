<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#9F8FD4" />
  <meta name="description" content="好きな人のページにすぐ飛べる、わたし用のランチャー。" />

  <title>ふぁんのーと</title>

  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/png" href="./icons/favicon.png" />

  <!-- iPhone home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ふぁんのーと" />
  <link rel="apple-touch-icon" href="./icons/icon-180.png" />

  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <!-- ===== ヘッダー ===== -->
  <header class="app-header">
    <h1 class="app-title">ふぁんのーと</h1>
    <div class="header-actions">
      <button class="header-reorder" id="reorder" type="button" aria-label="並べ替え">↕</button>
      <button class="header-refresh" id="refresh" type="button" aria-label="新着を更新">
        <span class="header-refresh-ico" aria-hidden="true">⟳</span>
      </button>
    </div>
  </header>

  <!-- ===== フィルターチップ ===== -->
  <nav class="chips" id="chips" aria-label="絞り込み"></nav>

  <!-- ===== 今日の進捗 ===== -->
  <div class="progress" id="progress"></div>

  <!-- ===== 人カードのリスト ===== -->
  <main class="list" id="list"></main>

  <!-- ===== ＋おきに追加ボタン ===== -->
  <button class="fab" id="fab" type="button" aria-label="追加">
    <span class="fab-plus">＋</span><span class="fab-text">追加</span>
  </button>

  <!-- ===== シート（追加・詳細）の入れ物 ===== -->
  <div class="sheet-backdrop" id="backdrop" hidden></div>
  <section class="sheet" id="sheet" hidden role="dialog" aria-modal="true" aria-labelledby="sheet-title"></section>

  <!-- ===== 確認ダイアログ ===== -->
  <div class="dialog-backdrop" id="dialog-backdrop" hidden>
    <div class="dialog" role="alertdialog" aria-modal="true" aria-labelledby="dialog-title">
      <p class="dialog-title" id="dialog-title"></p>
      <p class="dialog-body" id="dialog-body"></p>
      <div class="dialog-actions">
        <button class="btn btn-ghost" id="dialog-cancel" type="button">キャンセル</button>
        <button class="btn btn-primary" id="dialog-ok" type="button">OK</button>
      </div>
    </div>
  </div>

  <!-- ===== トースト（お知らせ） ===== -->
  <div class="toast" id="toast" hidden></div>

  <script src="./js/sortable.min.js"></script>
  <script src="./js/app.js"></script>
</body>
</html>
